services:
  redis:
    image: redis:alpine
    container_name: siped_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    image: scraping_siped_app:latest
    container_name: siped_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - shared_data:/app/datos_usuarios
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    image: scraping_siped_app:latest
    container_name: siped_worker
    restart: unless-stopped
    command: celery -A tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - shared_data:/app/datos_usuarios
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  shared_data: