<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scraper SIPED{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/formularios.js') }}" defer></script>
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}" hx-headers='{"Cache-Control": "no-cache"}'>
    {% block header %}{% endblock %}

    <main>
        <div id="flash-messages">
            {% include '_fragmento_mensajes.html' %}
        </div>
        
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
