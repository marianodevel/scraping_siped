<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scraper SIPED{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Custom -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/formularios.js') }}" defer></script>
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}bg-body-tertiary{% endblock %}" hx-headers='{"Cache-Control": "no-cache"}'>
    
    {% block header %}{% endblock %}

    <main class="container-fluid py-4" style="max-width: 1400px;">
        <div id="flash-messages">
            {% include '_fragmento_mensajes.html' %}
        </div>
        
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
