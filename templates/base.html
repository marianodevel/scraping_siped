<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestor SIPED{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-light">

    <div class="container-fluid pt-3">
        {% block header %}{% endblock %}

        <div id="flash-messages" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1055;">
            {% include '_fragmento_mensajes.html' %}
        </div>

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.body.addEventListener('htmx:configRequest', (event) => {
            // Aquí se pueden inyectar cabeceras adicionales si es necesario
        });
    </script>
</body>
</html>
