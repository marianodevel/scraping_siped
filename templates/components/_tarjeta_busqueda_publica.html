<div class="card mb-4 shadow-sm border-primary" id="fase_publica-container">
    <div class="card-header py-3 bg-primary text-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Búsqueda Masiva Pública</h5>
    </div>
    <div class="card-body p-4">
        <p class="card-text text-muted mb-4">Extrae todos los expedientes públicos disponibles en la localidad configurada.</p>
        <div class="d-flex align-items-center justify-content-between">
            <form hx-post="{{ url_for('iniciar_fase', nombre_fase='fase_publica') }}" hx-target="#flash-messages" hx-swap="innerHTML" class="m-0">
                <button type="submit" class="btn btn-primary"
                    {% if estados_tareas['fase_publica'].estado in ['PENDING', 'STARTED', 'RETRY'] %}disabled{% endif %}>
                    Iniciar Búsqueda
                </button>
            </form>
            <div id="estado-resultado-fase_publica" 
                 hx-get="{{ url_for('fragmento_estado', nombre_fase='fase_publica') }}" 
                 hx-trigger="load, every 3s" 
                 hx-swap="innerHTML">
                 {% with id_fase='fase_publica', estado=estados_tareas['fase_publica'] %}
                    {% include '_fragmento_estado.html' with context %}
                 {% endwith %}
            </div>
        </div>
    </div>
</div>
