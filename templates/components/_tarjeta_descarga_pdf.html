<div class="card mb-4 shadow-sm border-primary" id="fase_unico-container">
    <div class="card-header py-3 bg-primary text-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Descarga de Expediente</h5>
    </div>
    <div class="card-body p-4">
        <p class="card-text text-muted mb-4">Genera o descarga el PDF consolidado del expediente seleccionado.</p>
        <form hx-post="{{ url_for('iniciar_descarga_unico') }}" hx-target="#flash-messages" hx-swap="innerHTML" class="m-0">
            {% if expedientes_disponibles %}
                <div class="input-group mb-3">
                    <select name="expediente_seleccionado" class="form-select border-primary" required>
                        <option value="" disabled selected>-- Seleccione un Expediente --</option>
                        {% for exp in expedientes_disponibles %}
                            <option value="{{ exp.expediente }}">{{ exp.expediente }} - {{ exp.caratula }}</option>
                        {% endfor %}
                    </select>
                    <button type="submit" class="btn btn-primary fw-bold">Descargar PDF</button>
                </div>
            {% else %}
                <div class="alert alert-warning py-2">
                    <em>No hay lista de expedientes cargada.</em>
                </div>
            {% endif %}
            <div id="estado-resultado-fase_unico" 
                 hx-get="{{ url_for('fragmento_estado', nombre_fase='fase_unico') }}" 
                 hx-trigger="load, every 3s" 
                 hx-swap="innerHTML">
                 {% with estado=estados_tareas['fase_unico'] %}
                    {% include '_fragmento_estado.html' with context %}
                 {% endwith %}
            </div>
        </form>
    </div>
</div>
