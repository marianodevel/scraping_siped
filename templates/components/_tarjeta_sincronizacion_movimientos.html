<div class="card mb-4 shadow-sm border-primary" id="fase_2-container">
    <div class="card-header py-3 bg-primary text-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Descargar Movimientos (CSVs)</h5>
    </div>
    <div class="card-body p-4">
        <p class="card-text text-muted mb-4">Sincroniza los movimientos históricos de cada expediente de la lista.</p>
        <div class="d-flex align-items-center justify-content-between">
            <form hx-post="{{ url_for('iniciar_fase', nombre_fase='fase_2') }}" hx-target="#flash-messages" hx-swap="innerHTML" class="m-0">
                <button type="submit" class="btn btn-primary"
                    {% if estados_tareas['fase_2'].estado in ['PENDING', 'STARTED', 'RETRY'] %}disabled{% endif %}>
                    Sincronizar Datos
                </button>
            </form>
            <div id="estado-resultado-fase_2" 
                 hx-get="{{ url_for('fragmento_estado', nombre_fase='fase_2') }}" 
                 hx-trigger="load, every 3s" 
                 hx-swap="innerHTML">
                 {% with estado=estados_tareas['fase_2'] %}
                    {% include '_fragmento_estado.html' with context %}
                 {% endwith %}
            </div>
        </div>
    </div>
</div>
