{% if estado.estado != 'IDLE' %}
    <div class="d-flex flex-column align-items-end">
        <div class="small">
            <span class="badge {% if estado.estado == 'SUCCESS' %}bg-success{% elif estado.estado == 'FAILURE' %}bg-danger{% else %}bg-primary{% endif %}">
                {{ estado.estado }}
            </span>
            <span class="text-muted ms-2">{{ estado.resultado }}</span>
        </div>
        
        {% if estado.estado in ['FAILURE', 'REVOKED'] %}
            <div class="mt-1">
                <a href="javascript:void(0)" 
                   hx-get="{{ url_for('resetear_estado', nombre_fase=id_fase) }}" 
                   hx-target="#flash-messages" 
                   class="btn btn-link btn-sm p-0 text-danger text-decoration-none">
                    Limpiar Error
                </a>
            </div>
        {% endif %}

        {% if estado.estado == 'SUCCESS' %}
            <script>
                (function() {
                    const fase = "{{ id_fase }}";
                    const flagName = 'siped_auto_dl_' + fase;
                    
                    if (!window[flagName]) {
                        window[flagName] = true;
                        
                        if (fase === "fase_1") {
                            window.location.href = "{{ url_for('descargar_archivo', tipo='maestro', nombre_archivo='expedientes_completos.csv') }}?v=" + new Date().getTime();
                        } else if (fase === "fase_publica") {
                            window.location.href = "{{ url_for('descargar_archivo', tipo='maestro', nombre_archivo='expedientes_publicos.csv') }}?v=" + new Date().getTime();
                        } else if (fase === "fase_unico") {
                            const select = document.querySelector('select[name="expediente_seleccionado"]');
                            if (select && select.value) {
                                window.location.href = "{{ url_for('descargar_por_expediente', nro_expediente='') }}" + encodeURIComponent(select.value) + "?v=" + new Date().getTime();
                            }
                        }
                        
                        setTimeout(() => {
                            htmx.ajax('GET', '{{ url_for("resetear_estado", nombre_fase=id_fase) }}', {target: '#flash-messages', swap: 'innerHTML'});
                            window[flagName] = false;
                            
                            if (fase === "fase_2" || fase === "fase_descarga_publica") {
                                location.reload();
                            }
                        }, 2000);
                    }
                })();
            </script>
        {% endif %}
    </div>
{% endif %}
